<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}{% endblock %}</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#eef2f7;
}

header{

    background:#2c3e50;
    color:white;

    padding:20px;

    text-align:center;
}

.container{

    width:90%;
    max-width:1200px;

    margin:auto;

    margin-top:40px;
}

.card{

    background:white;

    padding:25px;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,.15);

}

button{

    padding:12px 30px;

    min-width:200px;

    height:50px;

    border:none;

    border-radius:8px;

    background:#3498db;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

}

button:hover{

    background:#2980b9;

}

table{

    width:100%;

    border-collapse:collapse;

    margin-top:20px;

}

th,td{

    padding:15px;

    border-bottom:1px solid #ddd;

    text-align:center;

}

th{

    background:#3498db;

    color:white;

}

tr{
    transition: transform 0.3s ease;
}

tr:hover{

    background:#f5f5f5;
    transform: scale(1.03) translateY(-3px);

}

h2{
    text-align:  center;
}

.button-group{

    display:flex;

    justify-content:center;

    gap:20px;

    margin-top:20px;

    flex-wrap:wrap;

}
.camera-feed{

    display:block;

    margin:30px auto;

    width:900px;

    max-width:100%;

    border-radius:15px;

    border:4px solid #2ecc71;

}

.dashboard-btn{
    width:240px;
}

.stats{

    display:flex;

    justify-content:space-between;

    gap:20px;

    margin-bottom:40px;

    flex-wrap:wrap;

}

.stat-card{

    flex:1;

    min-width:250px;

    background:#3498db;

    color:white;

    padding:25px;

    border-radius:12px;

    text-align:center;

    box-shadow:0 5px 12px rgba(0,0,0,.2);

    transition: transform 0.3s ease , box-shadow 0.3s ease;

}

.stat-card h3{

    margin-bottom:15px;

}

.stat-card h1{

    font-size:42px;

}

.stat-card:hover{
    transform: scale(1.05) translateY(-8px);
    box-shadow: 0 20px 30px rgba(0,0,0,.3);
}
</style>

</head>

<body>

<header>

<h1>AI Visitor Management System</h1>

</header>

<div class="container">

<div class="card">

{% block content %}
{% endblock %}

</div>

</div>

</body>
</html>
