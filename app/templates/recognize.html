<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recognition</title>
</head>
<body>
    {% extends "base.html" %}

    {% block title %}
    Recognition
    {% endblock %}

    {% block content %}

    <h2>Live Recognition</h2>

    <br>

    <img
        src="{{ url_for('recognize.video_feed') }}"
        class="camera-feed">

    <br><br>

    <div class="button-group">

        <a href="/">
            <button>Home</button>
        </a>

        <a href="/stop_camera">
            <button>Stop Camera</button>
        </a>

    </div>

    {% endblock %}
</body>
</html>
